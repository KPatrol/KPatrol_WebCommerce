name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect package manager
        id: pm
        shell: bash
        run: |
          if [[ -f pnpm-lock.yaml ]]; then echo "manager=pnpm" >> "$GITHUB_OUTPUT";
          elif [[ -f package-lock.json ]]; then echo "manager=npm" >> "$GITHUB_OUTPUT";
          elif [[ -f yarn.lock ]]; then echo "manager=yarn" >> "$GITHUB_OUTPUT";
          else echo "manager=none" >> "$GITHUB_OUTPUT"; fi

      - name: Setup Node.js
        if: steps.pm.outputs.manager != 'none'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: ${{ steps.pm.outputs.manager }}

      - name: Install (pnpm)
        if: steps.pm.outputs.manager == 'pnpm'
        run: |
          corepack enable
          pnpm install --frozen-lockfile

      - name: Install (npm)
        if: steps.pm.outputs.manager == 'npm'
        run: npm ci

      - name: Lint
        if: steps.pm.outputs.manager != 'none'
        run: |
          if [[ "${{ steps.pm.outputs.manager }}" == "pnpm" ]]; then pnpm lint || true;
          else npm run lint --if-present || true; fi

      - name: Build
        if: steps.pm.outputs.manager != 'none'
        run: |
          if [[ "${{ steps.pm.outputs.manager }}" == "pnpm" ]]; then pnpm build --if-present || true;
          else npm run build --if-present || true; fi

  python-checks:
    runs-on: ubuntu-latest
    if: hashFiles('**/*.py') != ''
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: python -m pip install --upgrade pip ruff
      - run: ruff check . || true
